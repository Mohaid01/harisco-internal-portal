services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: harisco_user
      POSTGRES_PASSWORD: harisco_password
      POSTGRES_DB: harisco_portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
